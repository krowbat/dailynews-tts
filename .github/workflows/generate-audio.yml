name: Generate Daily News Audio

on:
  schedule:
    # Run at 8:00 AM Edmonton time (14:00 UTC)
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  generate-audio:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Edge TTS
      run: |
        pip install edge-tts
        
    - name: Generate audio files
      run: |
        python scripts/generate-audio.py
        
    - name: Commit and push audio files
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add public/audio/
        git diff --staged --quiet || git commit -m "Update daily audio: $(date +%Y-%m-%d)"
        git push
